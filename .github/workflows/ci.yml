name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff format
        run: uv run --extra dev ruff format --check src scripts tests

      - name: Ruff lint
        run: uv run --extra dev ruff check src scripts tests

      - name: Mypy
        run: uv run --extra dev mypy src

      - name: Pytest
        run: uv run --extra dev pytest tests/
