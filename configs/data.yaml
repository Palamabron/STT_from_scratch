paths:
  root_dir: "."
  data_dir: "data"
  audio_dir: "data/audio"
  manifests_dir: "data/manifests"
  individual_manifests_dir: "data/manifests/individual"
  final_manifests_dir: "data/manifests/final"
  final_train_manifest: "data/manifests/final/train_final.jsonl"
  final_val_manifest: "data/manifests/final/val_final.jsonl"
  final_test_manifest: "data/manifests/final/test_final.jsonl"

hf:
  token_env: "HF_TOKEN"

run:
  target_sr: 16000
  skip_existing: true
  do_train: true
  do_val: true
  shuffle_seed: 42
  lowercase_text: true
  normalize_peak: true
  max_failures: 10000
  sample_per_dataset: null

# Dataset entries that share the same `name` are merged into one bucket.
# `samples` is the target size for the whole bucket (not per source row).
datasets:
  train:
    - name: "bigos_v2_train"
      hf_id: "amu-cai/pl-asr-bigos-v2"
      config_name: "pwr-azon_read-20"
      split: "train"
      lang: "pl"
      samples: 28200
      text_col: "ref_orig"
      audio_col: "audio"
      use_streaming: false

    - name: "bigos_v2_train"
      hf_id: "amu-cai/pl-asr-bigos-v2"
      config_name: "fair-mls-20"
      split: "train"
      lang: "pl"
      samples: 28200
      text_col: "ref_orig"
      audio_col: "audio"
      use_streaming: false

    - name: "bigos_v2_train"
      hf_id: "amu-cai/pl-asr-bigos-v2"
      config_name: "mozilla-common_voice_15-23"
      split: "train"
      lang: "pl"
      samples: 28200
      text_col: "ref_orig"
      audio_col: "audio"
      use_streaming: false

    - name: "cv21_pl_train"
      hf_id: "fsicoli/common_voice_21_0"
      config_name: "pl"
      split: "train"
      lang: "pl"
      samples: 14000
      text_col: "sentence"
      audio_col: "audio"
      use_streaming: true

    - name: "mls_pl_train"
      hf_id: "facebook/multilingual_librispeech"
      config_name: "polish"
      split: "train"
      lang: "pl"
      samples: 8000
      text_col: "transcript"
      audio_col: "audio"
      use_streaming: true

    - name: "librispeech_train"
      hf_id: "openslr/librispeech_asr"
      config_name: "clean"
      split: "train.360"
      lang: "en"
      samples: 38000
      text_col: "text"
      audio_col: "audio"
      use_streaming: true

    - name: "cv21_en_train"
      hf_id: "fsicoli/common_voice_21_0"
      config_name: "en"
      split: "train"
      lang: "en"
      samples: 18000
      text_col: "sentence"
      audio_col: "audio"
      use_streaming: true

  val:
    # bigos_pl_clean_val: two HF sources merged into one bucket (HF caps at ~1345 unique)
    - name: "bigos_pl_clean_val"
      hf_id: "amu-cai/pl-asr-bigos-v2"
      config_name: "pwr-azon_read-20"
      split: "validation"
      lang: "pl"
      samples: 1345
      text_col: "ref_orig"
      audio_col: "audio"
      use_streaming: false

    - name: "bigos_pl_clean_val"
      hf_id: "amu-cai/pl-asr-bigos-v2"
      config_name: "fair-mls-20"
      split: "validation"
      lang: "pl"
      samples: 1345
      text_col: "ref_orig"
      audio_col: "audio"
      use_streaming: false

    # Uses HF train split intentionally (spontaneous speech; source has ~357 utterances)
    - name: "bigos_pl_noisy_val"
      hf_id: "amu-cai/pl-asr-bigos-v2"
      config_name: "pwr-azon_spont-20"
      split: "train"
      lang: "pl"
      samples: 489
      text_col: "ref_orig"
      audio_col: "audio"
      use_streaming: false

    - name: "bigos_pl_noisy_val_cv15"
      hf_id: "amu-cai/pl-asr-bigos-v2"
      config_name: "mozilla-common_voice_15-23"
      split: "validation"
      lang: "pl"
      samples: 1500
      text_col: "ref_orig"
      audio_col: "audio"
      use_streaming: false

    - name: "librispeech_val"
      hf_id: "openslr/librispeech_asr"
      config_name: "clean"
      split: "validation"
      lang: "en"
      samples: 2500
      text_col: "text"
      audio_col: "audio"
      use_streaming: true

    - name: "cv21_pl_val"
      hf_id: "fsicoli/common_voice_21_0"
      config_name: "pl"
      split: "validation"
      lang: "pl"
      samples: 2000
      text_col: "sentence"
      audio_col: "audio"
      use_streaming: true

    - name: "cv21_en_val"
      hf_id: "fsicoli/common_voice_21_0"
      config_name: "en"
      split: "validation"
      lang: "en"
      samples: 2000
      text_col: "sentence"
      audio_col: "audio"
      use_streaming: true

    - name: "fleurs_pl_val"
      hf_id: "google/fleurs"
      config_name: "pl_pl"
      split: "validation"
      lang: "pl"
      samples: 350
      text_col: "transcription"
      audio_col: "audio"
      use_streaming: false

    - name: "fleurs_en_val"
      hf_id: "google/fleurs"
      config_name: "en_us"
      split: "validation"
      lang: "en"
      samples: 350
      text_col: "transcription"
      audio_col: "audio"
      use_streaming: false

    - name: "pelcra_pl_val"
      hf_id: "pelcra/pl-asr-pelcra-for-bigos"
      config_name: "ul-spokes_mix_luz-18"
      split: "validation"
      lang: "pl"
      samples: 500
      text_col: "ref_orig"
      audio_col: "audio"
      use_streaming: false

# Fast-Conformer training defaults (CLI overrides via --data.filter.* / --data.loader.*)
training:
  filter:
    subsampling_factor: 8
    max_duration: 16.0
  loader:
    train_max_batch_duration: 240
    train_max_batch_size: 64
  augment:
    noise_bank: "data/augment/noise_bank.pt"
    rir_bank: "data/augment/rir_bank.pt"
  tokenizer:
    model: "models/spm_unigram_4k_trainval.model"
    vocab_size: 4096
    model_type: unigram
  # Expected totals after rebuild_final_manifests.py:
  #   train ≈ 106200 (50200 pl + 56000 en)
  #   val   ≈ 11034  (6184 pl + 4850 en), val-only buckets, zero train overlap
