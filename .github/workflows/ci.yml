name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra demo

      - name: Ruff format
        run: uv run --extra dev --extra demo ruff format --check src scripts tests

      - name: Ruff lint
        run: uv run --extra dev --extra demo ruff check src scripts tests

      - name: Mypy
        run: uv run --extra dev --extra demo mypy src

      - name: Pytest
        run: uv run --extra dev --extra demo pytest tests/
